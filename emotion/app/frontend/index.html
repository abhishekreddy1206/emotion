<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>EMOSCAN — Facial Emotion Recognition</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=IBM+Plex+Mono:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
  <div class="noise-overlay"></div>
  <div class="scan-line"></div>

  <header class="header">
    <div class="logo-group">
      <div class="logo-icon">
        <svg viewBox="0 0 32 32" fill="none">
          <circle cx="16" cy="16" r="14" stroke="currentColor" stroke-width="1.5"/>
          <circle cx="11" cy="13" r="2" fill="currentColor"/>
          <circle cx="21" cy="13" r="2" fill="currentColor"/>
          <path d="M10 21c1.5 2.5 4 4 6 4s4.5-1.5 6-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
      </div>
      <h1 class="logo-text">EMOSCAN</h1>
    </div>
    <div class="status-pill">
      <span class="status-dot"></span>
      <span class="status-label" id="statusLabel">READY</span>
    </div>
  </header>

  <main class="main">
    <!-- Mode Toggle -->
    <div class="mode-toggle">
      <button class="mode-btn active" data-mode="upload" id="btnUpload">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <rect x="3" y="3" width="18" height="18" rx="3"/>
          <circle cx="8.5" cy="8.5" r="1.5"/>
          <path d="M21 15l-5-5L5 21"/>
        </svg>
        <span>Upload</span>
      </button>
      <button class="mode-btn" data-mode="camera" id="btnCamera">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z"/>
          <circle cx="12" cy="13" r="4"/>
        </svg>
        <span>Camera</span>
      </button>
      <div class="mode-slider" id="modeSlider"></div>
    </div>

    <!-- Upload Panel -->
    <section class="panel panel-upload active" id="panelUpload">
      <div class="drop-zone" id="dropZone">
        <div class="drop-zone-inner">
          <div class="drop-icon">
            <svg viewBox="0 0 48 48" fill="none" stroke="currentColor" stroke-width="1.5">
              <path d="M24 32V16m0 0l-7 7m7-7l7 7" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M8 32v4a4 4 0 004 4h24a4 4 0 004-4v-4" stroke-linecap="round"/>
            </svg>
          </div>
          <p class="drop-text">Drop image here</p>
          <p class="drop-sub">or tap to browse</p>
          <input type="file" id="fileInput" accept="image/*" hidden>
        </div>
        <div class="drop-zone-preview" id="dropPreview">
          <img id="previewImg" alt="Preview">
          <button class="clear-btn" id="clearBtn" title="Clear">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
            </svg>
          </button>
        </div>
      </div>
      <button class="analyze-btn" id="analyzeBtn" disabled>
        <span class="analyze-text">Analyze</span>
        <span class="analyze-loading">
          <span class="spinner"></span>
          Scanning...
        </span>
      </button>
    </section>

    <!-- Camera Panel -->
    <section class="panel panel-camera" id="panelCamera">
      <div class="camera-viewport" id="cameraViewport">
        <video id="cameraFeed" autoplay playsinline muted></video>
        <canvas id="overlayCanvas"></canvas>
        <div class="camera-frame">
          <span class="corner tl"></span>
          <span class="corner tr"></span>
          <span class="corner bl"></span>
          <span class="corner br"></span>
        </div>
        <div class="camera-controls">
          <button class="cam-ctrl-btn" id="flipBtn" title="Flip camera">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <path d="M17 1l4 4-4 4"/>
              <path d="M3 11V9a4 4 0 014-4h14"/>
              <path d="M7 23l-4-4 4-4"/>
              <path d="M21 13v2a4 4 0 01-4 4H3"/>
            </svg>
          </button>
          <button class="cam-ctrl-btn cam-capture" id="captureBtn" title="Capture">
            <div class="capture-ring"></div>
          </button>
          <button class="cam-ctrl-btn" id="streamToggle" title="Toggle live stream">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" class="icon-stream-off">
              <circle cx="12" cy="12" r="3"/>
              <path d="M16.24 7.76a6 6 0 010 8.49"/>
              <path d="M19.07 4.93a10 10 0 010 14.14"/>
            </svg>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" class="icon-stream-on" style="display:none">
              <circle cx="12" cy="12" r="3" fill="currentColor"/>
              <path d="M16.24 7.76a6 6 0 010 8.49"/>
              <path d="M19.07 4.93a10 10 0 010 14.14"/>
            </svg>
          </button>
        </div>
      </div>
    </section>

    <!-- Results Panel -->
    <section class="results-panel" id="resultsPanel">
      <div class="results-header">
        <h2 class="results-title">Emotional Spectrum</h2>
        <span class="results-face-count" id="faceCount"></span>
      </div>
      <div class="results-body" id="resultsBody">
        <!-- Populated by JS -->
      </div>
    </section>
  </main>

  <footer class="footer">
    <span class="footer-text">EMOSCAN v1.0 — Facial Emotion Recognition</span>
  </footer>

  <script src="/static/app.js"></script>
</body>
</html>
